services:
  mysql:
    image: mysql:8.4
    container_name: smart-education-mysql
    environment:
      MYSQL_DATABASE: student_db
      MYSQL_USER: sms
      MYSQL_PASSWORD: a666666.
      MYSQL_ROOT_PASSWORD: a666666.
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pa666666."]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: smart-education-redis

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: smart-education-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  app:
    build:
      context: .
    container_name: smart-education-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: student_db
      DB_USERNAME: sms
      DB_PASSWORD: a666666.
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: education-files
      JWT_SECRET: ChangeThisJwtSecretBeforeProductionUse_AtLeast32CharsLong
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  mysql-data:
  minio-data:
