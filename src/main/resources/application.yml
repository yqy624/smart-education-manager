server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:student_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    mode: HTML
    enabled: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  cache:
    type: redis
    redis:
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "sms::"

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3s

jwt:
  secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef}
  expiration: 86400000

# 【模块4新增】文件上传存储配置
file:
  # 历史本地附件目录，仅用于迁移期回退读取
  legacy-upload-dir: ./uploads
  # 允许的文件后缀白名单（小写，不含点）
  allowed-extensions: pdf,doc,docx,xls,xlsx,ppt,pptx,txt,zip,rar,7z,jpg,jpeg,png,gif

storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:education-files}
    secure: ${MINIO_SECURE:false}
    auto-create-bucket: ${MINIO_AUTO_CREATE_BUCKET:true}

logging:
  level:
    com.sms: DEBUG
    org.springframework.security: INFO
