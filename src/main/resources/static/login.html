<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教育管理系统 - 登录</title>
  <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="/css/app.css?v=20240630" rel="stylesheet">
</head>
<body class="auth-shell">
  <div class="auth-card row g-0">
    <div class="col-lg-5 auth-hero">
      <div class="brand-mark mb-4"><i class="fa-solid fa-graduation-cap fs-2"></i></div>
      <h1 class="h2 fw-bold mb-3">教育管理系统</h1>
      <p class="mb-4 text-white-50">管理员、教师、学生统一登录入口，登录后按角色跳转到对应工作台。</p>
      <div class="hero-mini">
        <div class="mini"><div class="fw-semibold"><i class="fa-solid fa-layer-group me-1"></i>多角色</div><div class="small text-white-50 mt-1">一站式工作台</div></div>
        <div class="mini"><div class="fw-semibold"><i class="fa-solid fa-bell me-1"></i>实时通知</div><div class="small text-white-50 mt-1">消息及时触达</div></div>
        <div class="mini"><div class="fw-semibold"><i class="fa-solid fa-chart-pie me-1"></i>数据分析</div><div class="small text-white-50 mt-1">成绩趋势可视化</div></div>
      </div>
      <div class="d-flex flex-wrap gap-2 mt-4">
        <button class="btn btn-outline-light btn-sm" onclick="fillDemo('admin','admin123','ADMIN')">管理员</button>
        <button class="btn btn-outline-light btn-sm" onclick="fillDemo('teacher1','teacher123','TEACHER')">教师</button>
        <button class="btn btn-outline-light btn-sm" onclick="fillDemo('student1','student123','STUDENT')">学生</button>
      </div>
    </div>
    <div class="col-lg-7 auth-body">
      <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
          <h2 class="h4 fw-bold mb-1">欢迎回来</h2>
          <div class="text-muted">请使用账号、密码和角色登录</div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">角色</label>
        <select id="role" class="form-select">
          <option value="ADMIN">管理员</option>
          <option value="TEACHER">教师</option>
          <option value="STUDENT">学生</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">用户名</label>
        <input id="username" class="form-control" autocomplete="username">
      </div>
      <div class="mb-3">
        <label class="form-label">密码</label>
        <input id="password" type="password" class="form-control" autocomplete="current-password">
      </div>
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input id="remember" class="form-check-input" type="checkbox">
          <label class="form-check-label" for="remember">记住密码</label>
        </div>
        <div class="d-flex gap-3">
          <a class="small text-decoration-none" href="javascript:void(0)" data-bs-toggle="modal" data-bs-target="#registerModal">注册账号</a>
          <a class="small text-decoration-none" href="javascript:void(0)" data-bs-toggle="modal" data-bs-target="#forgotModal">忘记密码</a>
        </div>
      </div>
      <button id="loginBtn" class="btn btn-primary w-100 py-2" onclick="login()">登录</button>
      <div class="mt-3 text-muted small">默认测试账号：admin / admin123，teacher1 / teacher123，student1 / student123</div>
    </div>
  </div>

  <!-- 注册账号 Modal -->
  <div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius:18px;background:var(--bg-card);backdrop-filter:blur(18px);">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold"><i class="fa-solid fa-user-plus me-2"></i>注册账号</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">账号角色</label>
            <select id="regRole" class="form-select">
              <option value="STUDENT">学生</option>
              <option value="TEACHER">教师</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">用户名</label>
            <input id="regUsername" class="form-control" placeholder="请输入用户名，至少3位">
          </div>
          <div class="mb-3">
            <label class="form-label">姓名</label>
            <input id="regDisplayName" class="form-control" placeholder="请输入姓名或昵称">
          </div>
          <div class="mb-3">
            <label class="form-label">邮箱</label>
            <input id="regEmail" class="form-control" placeholder="example@school.edu">
          </div>
          <div class="mb-3">
            <label class="form-label">密码</label>
            <input id="regPassword" type="password" class="form-control" placeholder="输入密码，至少6位">
          </div>
          <div class="mb-3">
            <label class="form-label">确认密码</label>
            <input id="regConfirm" type="password" class="form-control" placeholder="再次输入密码">
          </div>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button id="regBtn" class="btn btn-primary" onclick="registerAccount()">
            <i class="fa-solid fa-user-plus me-1"></i>注册
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 忘记密码 Modal -->
  <div class="modal fade" id="forgotModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius:18px;background:var(--bg-card);backdrop-filter:blur(18px);">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold"><i class="fa-solid fa-key me-2"></i>重置密码</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">用户名</label>
            <input id="fpUsername" class="form-control" placeholder="请输入您的用户名">
          </div>
          <div class="mb-3">
            <label class="form-label">账号角色</label>
            <select id="fpRole" class="form-select">
              <option value="ADMIN">管理员</option>
              <option value="TEACHER">教师</option>
              <option value="STUDENT">学生</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">注册邮箱 <span class="text-muted small">（选填，验证身份用）</span></label>
            <input id="fpEmail" class="form-control" placeholder="example@school.edu">
          </div>
          <div class="mb-3">
            <label class="form-label">新密码</label>
            <input id="fpPassword" type="password" class="form-control" placeholder="输入新密码">
          </div>
          <div class="mb-3">
            <label class="form-label">确认新密码</label>
            <input id="fpConfirm" type="password" class="form-control" placeholder="再次输入新密码">
          </div>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button id="fpBtn" class="btn btn-primary" onclick="forgotPassword()">
            <i class="fa-solid fa-rotate me-1"></i>重置密码
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast align-items-center text-bg-danger border-0 position-fixed top-0 end-0 m-3" id="toastBox" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastText">提示</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
  <div class="toast align-items-center text-bg-success border-0 position-fixed top-0 end-0 m-3" id="toastBoxSuccess" role="alert" style="z-index:9999;">
    <div class="d-flex">
      <div class="toast-body" id="toastTextSuccess">成功</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>

  <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
  <script>
    const rememberKey = "sms-remember-login";
    const saved = localStorage.getItem(rememberKey);
    if (saved) {
      const data = JSON.parse(saved);
      username.value = data.username || "";
      password.value = data.password || "";
      role.value = data.role || "ADMIN";
      remember.checked = true;
    }

    function fillDemo(u, p, r) {
      username.value = u;
      password.value = p;
      role.value = r;
    }

    function showToast(msg, type) {
      if (type === undefined) type = "danger";
      if (type === "success") {
        document.getElementById("toastTextSuccess").textContent = msg;
        bootstrap.Toast.getOrCreateInstance(document.getElementById("toastBoxSuccess")).show();
      } else {
        document.getElementById("toastText").textContent = msg;
        bootstrap.Toast.getOrCreateInstance(document.getElementById("toastBox")).show();
      }
    }

    async function login() {
      const payload = {
        username: username.value.trim(),
        password: password.value.trim(),
        role: role.value
      };
      if (!payload.username || !payload.password) {
        showToast("请输入用户名和密码");
        return;
      }
      loginBtn.disabled = true;
      loginBtn.textContent = "登录中...";
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || "登录失败");
        const user = data.data;
        localStorage.setItem("token", user.token);
        localStorage.setItem("role", user.role);
        localStorage.setItem("displayName", user.displayName || user.username);
        localStorage.setItem("username", user.username);
        if (remember.checked) {
          localStorage.setItem(rememberKey, JSON.stringify(payload));
        } else {
          localStorage.removeItem(rememberKey);
        }
        location.href = user.redirectUrl + "?token=" + encodeURIComponent(user.token);
      } catch (e) {
        showToast(e.message);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "登录";
      }
    }

    async function registerAccount() {
      const username = regUsername.value.trim();
      const displayName = regDisplayName.value.trim();
      const email = regEmail.value.trim();
      const password = regPassword.value.trim();
      const confirm = regConfirm.value.trim();
      const roleValue = regRole.value;

      if (!username) { showToast("请输入用户名"); return; }
      if (username.length < 3) { showToast("用户名长度至少3位"); return; }
      if (!password) { showToast("请输入密码"); return; }
      if (password.length < 6) { showToast("密码长度至少6位"); return; }
      if (password !== confirm) { showToast("两次密码输入不一致"); return; }

      regBtn.disabled = true;
      regBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i>注册中...';
      try {
        const res = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password, displayName: displayName || username, email: email || null, role: roleValue })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || "注册失败");
        showToast("注册成功，请使用新账号登录", "success");
        bootstrap.Modal.getInstance(document.getElementById("registerModal")).hide();
        role.value = roleValue;
        window.username.value = username;
        window.password.value = "";
        regUsername.value = "";
        regDisplayName.value = "";
        regEmail.value = "";
        regPassword.value = "";
        regConfirm.value = "";
      } catch (e) {
        showToast(e.message);
      } finally {
        regBtn.disabled = false;
        regBtn.innerHTML = '<i class="fa-solid fa-user-plus me-1"></i>注册';
      }
    }

    async function forgotPassword() {
      const username = fpUsername.value.trim();
      const role = fpRole.value;
      const email = fpEmail.value.trim();
      const password = fpPassword.value.trim();
      const confirm = fpConfirm.value.trim();

      if (!username) { showToast("请输入用户名"); return; }
      if (!password) { showToast("请输入新密码"); return; }
      if (password.length < 6) { showToast("密码长度至少6位"); return; }
      if (password !== confirm) { showToast("两次密码输入不一致"); return; }

      fpBtn.disabled = true;
      fpBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i>重置中...';
      try {
        const res = await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, role, email: email || null, newPassword: password })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || "重置失败");
        showToast("密码重置成功，请使用新密码登录", "success");
        bootstrap.Modal.getInstance(document.getElementById("forgotModal")).hide();
        fpUsername.value = "";
        fpEmail.value = "";
        fpPassword.value = "";
        fpConfirm.value = "";
      } catch (e) {
        showToast(e.message);
      } finally {
        fpBtn.disabled = false;
        fpBtn.innerHTML = '<i class="fa-solid fa-rotate me-1"></i>重置密码';
      }
    }

    document.getElementById("registerModal").addEventListener("show.bs.modal", function() {
      regRole.value = role.value === "ADMIN" ? "STUDENT" : role.value;
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        var register = document.getElementById("registerModal");
        var forgot = document.getElementById("forgotModal");
        if (register && register.classList.contains("show")) {
          registerAccount();
        } else if (forgot && forgot.classList.contains("show")) {
          forgotPassword();
        } else {
          login();
        }
      }
    });
  </script>
</body>
</html>
