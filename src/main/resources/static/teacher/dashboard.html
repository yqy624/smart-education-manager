<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教师工作台</title>
  <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.1/echarts.min.js?v=20240630"></script>
  <link href="/css/app.css?v=20260705" rel="stylesheet">
</head>
<body class="page-shell" data-role="teacher">
<div class="dashboard-shell">
  <aside class="sidebar">
    <div class="d-flex align-items-center gap-2 mb-4">
      <div class="brand-mark"><i class="fa-solid fa-chalkboard-user"></i></div>
      <div>
        <div class="fw-bold">教师工作台</div>
        <div class="small text-white-50">课程、作业、互评、评分</div>
      </div>
    </div>
    <div class="nav-item active" data-tab="dashboard"><i class="fa-solid fa-chart-line"></i> 概览</div>
    <div class="nav-item" data-tab="courses"><i class="fa-solid fa-book"></i> 课程</div>
    <div class="nav-item" data-tab="students"><i class="fa-solid fa-user-graduate"></i> 学生</div>
    <div class="nav-item" data-tab="assignments"><i class="fa-solid fa-file-circle-plus"></i> 作业</div>
    <div class="nav-item" data-tab="peer-review"><i class="fa-solid fa-comments"></i> 互评</div>
    <div class="nav-item" data-tab="grading"><i class="fa-solid fa-pen-nib"></i> 评分</div>
    <div class="nav-item" data-tab="analysis"><i class="fa-solid fa-chart-column"></i> 分析</div>
  </aside>
  <main class="main-area">
    <div class="topbar mb-3">
      <div>
        <div class="fw-semibold" id="titleText">概览</div>
        <div class="breadcrumb-bar p-0" id="breadcrumb"></div>
      </div>
      <div class="d-flex align-items-center gap-3">
        <button id="themeToggle" class="btn btn-outline-secondary btn-sm" onclick="App.toggleTheme()"><i class="fa-solid fa-moon"></i></button>
        <div class="notif-wrap">
          <button class="notif-btn" onclick="App.toggleNotifPanel()"><i class="fa-regular fa-bell"></i><span class="notif-badge" id="notifBadge">0</span></button>
          <div class="notif-panel" id="notifPanel">
            <div class="notif-head d-flex justify-content-between"><span>通知中心</span><a href="javascript:;" onclick="App.markAllRead()">全部已读</a></div>
            <div id="notifBody"></div>
          </div>
        </div>
        <button class="btn btn-link p-0 text-decoration-none fw-semibold text-body" id="userName" type="button" onclick="openProfileModal()" title="个人主页">教师</button>
        <a href="javascript:App.logout()" class="logout-link text-decoration-none text-muted small" title="退出登录">
          <i class="fa-solid fa-right-from-bracket"></i>
        </a>
      </div>
    </div>

    <section id="view-dashboard" class="view">
      <div class="hero-banner mb-3">
        <div class="eyebrow"><i class="fa-solid fa-chalkboard-user"></i> 教师工作台</div>
        <div class="title">欢迎回来，<span id="heroName">教师</span></div>
        <div class="desc">管理课程与作业，开放匿名互评，查看学生参与情况和成绩分析。</div>
      </div>
      <div class="kpi-grid mb-3" id="kpiGrid"></div>
      <div class="row g-3 align-items-stretch">
        <div class="col-lg-8"><div class="section-card dashboard-card-fill"><div class="section-head"><h5 class="mb-0">课程选课趋势</h5><span class="metric-muted">按课程查看当前选课人数</span></div><div class="card-body-fill"><div id="chartCourses" style="height:320px"></div></div></div></div>
        <div class="col-lg-4"><div class="section-card dashboard-card-fill" id="recentActivityBox"><div class="section-head"><h5 class="mb-0">近期活动</h5><span class="metric-muted">管理员发布动态</span></div><div class="card-body-fill"><div id="recentActivityList" class="text-muted small">加载中...</div></div></div></div>
      </div>
    </section>
    <section id="view-courses" class="view d-none"><div class="section-card" id="courseBox"></div></section>
    <section id="view-students" class="view d-none"><div class="section-card" id="studentBox"></div></section>
    <section id="view-assignments" class="view d-none"><div class="section-card" id="assignmentBox"></div></section>
    <section id="view-peer-review" class="view d-none"><div class="section-card" id="peerReviewManageBox"></div></section>
    <section id="view-grading" class="view d-none"><div class="section-card" id="gradingBox"></div></section>
    <section id="view-analysis" class="view d-none"><div class="section-card" id="analysisBox"></div></section>
  </main>
</div>

<div class="modal fade" id="profileModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">个人主页</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <label class="form-label" for="profileUsername">用户名</label>
        <input id="profileUsername" class="form-control mb-2" disabled>
        <label class="form-label" for="profileDisplayName">姓名</label>
        <input id="profileDisplayName" class="form-control mb-2" maxlength="50" placeholder="请输入姓名">
        <label class="form-label" for="profileEmail">邮箱</label>
        <input id="profileEmail" type="email" class="form-control mb-2" maxlength="100" placeholder="请输入邮箱">
        <label class="form-label" for="profilePassword">新密码</label>
        <input id="profilePassword" type="password" class="form-control" placeholder="不修改请留空">
        <div class="form-text">密码留空时不会修改原密码。</div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="saveProfile()">保存</button></div>
    </div>
  </div>
</div>

<div class="modal fade" id="courseModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="courseModalTitle">新建课程</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input id="courseId" type="hidden">
        <label class="form-label" for="courseName">课程名称</label>
        <input id="courseName" class="form-control mb-2" placeholder="请输入课程名称">
        <label class="form-label" for="courseDesc">课程描述</label>
        <input id="courseDesc" class="form-control mb-2" placeholder="请输入课程描述">
        <label class="form-label" for="courseSchedule">上课时间</label>
        <input id="courseSchedule" class="form-control mb-2" placeholder="如 Mon 10:00">
        <label class="form-label" for="courseMax">可选人数</label>
        <input id="courseMax" type="number" class="form-control mb-2" value="50">
        <label class="form-label" for="courseCredits">学分</label>
        <input id="courseCredits" type="number" class="form-control mb-2" value="3">
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="saveCourse()">保存</button></div>
    </div>
  </div>
</div>

<div class="modal fade" id="assignModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">发布作业</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="row g-2">
          <div class="col-md-6"><label class="form-label" for="assignTitle">作业标题</label><input id="assignTitle" class="form-control" placeholder="请输入作业标题"></div>
          <div class="col-md-6"><label class="form-label" for="assignCourse">所属课程</label><select id="assignCourse" class="form-select"></select></div>
          <div class="col-md-6"><label class="form-label" for="assignDue">截止日期</label><input id="assignDue" type="datetime-local" class="form-control"></div>
          <div class="col-md-6"><label class="form-label" for="assignPoints">作业满分</label><input id="assignPoints" type="number" class="form-control" value="100"></div>
          <div class="col-12"><label class="form-label" for="assignDesc">作业要求</label><textarea id="assignDesc" class="form-control" rows="4" placeholder="请输入作业要求和提交内容说明"></textarea></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="publishAssignment()">发布</button></div>
    </div>
  </div>
</div>

<div class="modal fade" id="peerConfigModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">互评配置</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="peerConfigAssignmentId">
        <div class="mb-3 fw-semibold" id="peerConfigTitle"></div>
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" id="peerEnabled">
          <label class="form-check-label" for="peerEnabled">开启匿名互评</label>
        </div>
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label" for="peerOpenAt">开放时间</label><input id="peerOpenAt" type="datetime-local" class="form-control"></div>
          <div class="col-md-6"><label class="form-label" for="peerCloseAt">截止时间</label><input id="peerCloseAt" type="datetime-local" class="form-control"></div>
          <div class="col-md-4"><label class="form-label" for="peerRequiredCount">每人互评次数</label><input id="peerRequiredCount" type="number" class="form-control" value="1" min="1"></div>
          <div class="col-md-4"><label class="form-label" for="peerBonusPerReview">每次加分</label><input id="peerBonusPerReview" type="number" class="form-control" value="1" min="0" step="0.5"></div>
          <div class="col-md-4"><label class="form-label" for="peerBonusCap">加分上限</label><input id="peerBonusCap" type="number" class="form-control" value="1" min="0" step="0.5"></div>
          <div class="col-12"><label class="form-label" for="peerPrompt">互评提示</label><textarea id="peerPrompt" class="form-control" rows="4" placeholder="告诉学生应从哪些方面进行匿名评价"></textarea></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="savePeerConfig()">保存配置</button></div>
    </div>
  </div>
</div>

<div class="modal fade" id="gradeModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">批改作业</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="gradeSubmissionId">
        <input type="hidden" id="gradeQuickCommentId">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label" for="gradeScore">分数</label>
            <input id="gradeScore" type="number" class="form-control" min="0" max="100" step="0.5" placeholder="0-100">
          </div>
          <div class="col-md-8">
            <label class="form-label" for="gradeStudentName">学生</label>
            <input id="gradeStudentName" class="form-control" disabled>
          </div>
          <div class="col-12">
            <label class="form-label" for="gradeComment">评语</label>
            <textarea id="gradeComment" class="form-control" rows="4" placeholder="请输入批改评语"></textarea>
          </div>
          <div class="col-12">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-2">
              <div class="fw-semibold">快捷评语</div>
              <div class="btn-group btn-group-sm" role="group">
                <button class="btn btn-outline-primary active" type="button" data-category="all" onclick="loadQuickComments('all')">全部</button>
                <button class="btn btn-outline-primary" type="button" data-category="ENCOURAGEMENT" onclick="loadQuickComments('ENCOURAGEMENT')">鼓励</button>
                <button class="btn btn-outline-primary" type="button" data-category="CORRECTION" onclick="loadQuickComments('CORRECTION')">纠错</button>
                <button class="btn btn-outline-primary" type="button" data-category="SCORE_IMPROVEMENT" onclick="loadQuickComments('SCORE_IMPROVEMENT')">提分</button>
              </div>
            </div>
            <div id="quickCommentBox" class="d-flex flex-wrap gap-2"></div>
            <div class="form-text">常用评语会自动记忆，并按你的使用频率排序。</div>
          </div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-primary" onclick="submitGrade()">提交评分</button></div>
    </div>
  </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js?v=20260705"></script>
<script>
window.TOKEN = new URLSearchParams(location.search).get("token") || localStorage.getItem("token") || "";
if (!TOKEN) location.href = "/login.html";
App.initTheme();
App.initNotifications(TOKEN);
App.setBreadcrumb(["教师工作台", "概览"]);
var displayName = localStorage.getItem("displayName") || "教师";
document.getElementById("userName").textContent = displayName;
document.getElementById("heroName").textContent = displayName;

var tabs = Array.from(document.querySelectorAll(".nav-item"));
var teacherCourses = [];
var teacherAssignments = [];
var gradingSubmissionMeta = {};
var currentGradeRow = null;
var teacherActivityPage = 1;
var teacherActivityPageSize = 3;
var quickCommentCategory = 'all';
tabs.forEach(function(el) { el.addEventListener("click", function() { switchTab(el.dataset.tab); }); });
function switchTab(tab) {
  tabs.forEach(function(x) { x.classList.toggle("active", x.dataset.tab === tab); });
  document.querySelectorAll(".view").forEach(function(v) { v.classList.add("d-none"); });
  document.getElementById("view-" + tab).classList.remove("d-none");
  var title = {dashboard:"概览", courses:"课程管理", students:"学生管理", assignments:"作业管理", "peer-review":"互评管理", grading:"评分", analysis:"分析"}[tab];
  document.getElementById("titleText").textContent = title;
  App.setBreadcrumb(["教师工作台", title]);
  if (tab === "courses") loadCourses();
  if (tab === "students") loadStudents();
  if (tab === "assignments") loadAssignments();
  if (tab === "peer-review") loadPeerReviewManage();
  if (tab === "grading") loadGrading();
  if (tab === "analysis") loadAnalysis();
}

async function api(url, method, body) {
  if (method === undefined) method = "GET";
  var res = await fetch("/api" + url, {
    method: method,
    headers: { "Content-Type": "application/json", Authorization: "Bearer " + TOKEN },
    body: body ? JSON.stringify(body) : null
  });
  var data = await res.json();
  if (!data.success) throw new Error(data.message || "请求失败");
  return data.data;
}

async function openProfileModal() {
  try {
    var profile = await api("/profile");
    profileUsername.value = profile.username || "";
    profileDisplayName.value = profile.displayName || "";
    profileEmail.value = profile.email || "";
    profilePassword.value = "";
    new bootstrap.Modal(profileModal).show();
  } catch (err) {
    alert(err.message || "加载个人资料失败");
  }
}

async function saveProfile() {
  try {
    var payload = {
      displayName: profileDisplayName.value.trim(),
      email: profileEmail.value.trim(),
      newPassword: profilePassword.value.trim()
    };
    if (!payload.newPassword) delete payload.newPassword;
    var profile = await api("/profile", "PUT", payload);
    var name = profile.displayName || profile.username || "教师";
    localStorage.setItem("displayName", name);
    document.getElementById("userName").textContent = name;
    document.getElementById("heroName").textContent = name;
    bootstrap.Modal.getInstance(profileModal).hide();
    alert("个人资料已更新");
  } catch (err) {
    alert(err.message || "保存失败");
  }
}

function handleKpiKey(event, tab) {
  if (event.key === "Enter" || event.key === " ") {
    event.preventDefault();
    switchTab(tab);
  }
}

function renderEmptyPanel(title, desc, compact) {
  return '<div class="empty-panel ' + (compact ? 'compact' : '') + '"><div class="empty-panel-copy"><div class="empty-panel-title">' + App.escapeHtml(title) + '</div><div class="empty-panel-desc">' + App.escapeHtml(desc) + '</div></div></div>';
}

function humanFileLabel(filePaths) {
  if (!filePaths) return '无附件';
  return filePaths.split(',').map(function(item) {
    var value = String(item || '').trim();
    if (!value) return null;
    var parts = value.split('::');
    return parts[1] || '已上传附件';
  }).filter(Boolean).join('、') || '无附件';
}

function previewStoredFile(path) {
  return App.previewFile(path);
}

function downloadStoredFile(path, name) {
  return App.downloadFile('/files/download?path=' + encodeURIComponent(path), name || '附件');
}

function renderActivityPager(total, page, action) {
  var pages = Math.max(1, Math.ceil(total / teacherActivityPageSize));
  if (pages <= 1) return '';
  var html = '<div class="activity-pager"><button class="btn btn-outline-secondary btn-sm" onclick="' + action + '(' + Math.max(1, page - 1) + ')" ' + (page <= 1 ? 'disabled' : '') + '>上一页</button>';
  for (var i = 1; i <= pages; i++) {
    html += '<button class="btn ' + (i === page ? 'btn-primary' : 'btn-outline-secondary') + ' btn-sm" onclick="' + action + '(' + i + ')">' + i + '</button>';
  }
  html += '<button class="btn btn-outline-secondary btn-sm" onclick="' + action + '(' + Math.min(pages, page + 1) + ')" ' + (page >= pages ? 'disabled' : '') + '>下一页</button></div>';
  return html;
}

function goTeacherActivityPage(page) {
  teacherActivityPage = page;
  loadDashboard();
}

async function loadDashboard() {
  var dashboard = await api('/teacher/dashboard');
  var courses = dashboard.courseTrend || [];
  var activities = dashboard.recentActivities || [];
  var totalCourses = dashboard.totalCourses || 0;
  var totalStudents = dashboard.totalStudents || 0;
  var peerEnabled = dashboard.peerEnabledCount || 0;
  var activeCourses = dashboard.activeCourses || 0;
  document.getElementById("kpiGrid").innerHTML = [
    { label: "负责课程", value: totalCourses, color: "var(--accent)", tab: "courses" },
    { label: "学生总数", value: totalStudents, color: "var(--accent-2)", tab: "students" },
    { label: "已开互评", value: peerEnabled, color: "var(--accent-3)", tab: "peer-review" },
    { label: "有学生课程", value: activeCourses, color: "var(--accent-4)", tab: "analysis" }
  ].map(function(k) { return '<div class="kpi" role="button" tabindex="0" onclick="switchTab(\'' + k.tab + '\')" onkeydown="handleKpiKey(event, \'' + k.tab + '\')" style="border-left:4px solid ' + k.color + '"><div class="value">' + k.value + '</div><div class="label">' + k.label + '</div></div>'; }).join("");

  var activityPages = Math.max(1, Math.ceil(activities.length / teacherActivityPageSize));
  if (teacherActivityPage > activityPages) teacherActivityPage = activityPages;
  var activityStart = (teacherActivityPage - 1) * teacherActivityPageSize;
  var pageActivities = activities.slice(activityStart, activityStart + teacherActivityPageSize);
  document.getElementById("recentActivityList").innerHTML = activities.length
    ? '<div class="activity-page-list">' + pageActivities.map(function(item) {
        return '<div class="activity-item"><div class="activity-title">' + App.escapeHtml(item.title || '平台活动') + '</div><div class="activity-content">' + App.escapeHtml(item.content || '暂无活动内容') + '</div><div class="activity-meta">' + App.timeAgo(item.publishedAt || item.createdAt) + '</div></div>';
      }).join('') + '</div>' + renderActivityPager(activities.length, teacherActivityPage, 'goTeacherActivityPage')
    : renderEmptyPanel('暂无近期活动', '管理员发布活动后，会在这里展示最近动态。', true);

  var chartEl = document.getElementById("chartCourses");
  try {
    if (!chartEl) return;
    chartEl.innerHTML = '';
    var chart = echarts.getInstanceByDom(chartEl) || echarts.init(chartEl);
    if (courses.length) {
      chartEl.style.display = 'block';
      chart.setOption({
        tooltip: {},
        grid: { left: 40, right: 16, top: 20, bottom: 24 },
        xAxis: { type: "category", data: courses.map(function(c) { return c.name || '未命名课程'; }) },
        yAxis: { type: "value" },
        series: [{ type: "bar", data: courses.map(function(c) { return c.value || 0; }), itemStyle: { color: "#0f766e", borderRadius: [8,8,0,0] } }]
      });
      chart.resize();
    } else {
      chart.clear();
      chartEl.innerHTML = renderEmptyPanel('暂无课程趋势', '创建课程后，这里会展示每门课程的选课人数。', false);
    }
  } catch (err) {
    chartEl.innerHTML = renderEmptyPanel('暂无课程趋势', '当前课程趋势暂时无法渲染，请稍后刷新重试。', false);
    console.error(err);
  }
}

async function loadCourses() {
  var courses = await api("/teacher/courses");
  teacherCourses = courses;
  var html = '<div class="section-head"><h5 class="mb-0">课程管理</h5><button class="btn btn-primary btn-sm" onclick="openCourseModal()">新建课程</button></div>';
  if (!courses.length) {
    document.getElementById("courseBox").innerHTML = html + renderEmptyPanel('暂无课程', '先创建课程，再安排学生和作业内容。', false);
    document.getElementById("assignCourse").innerHTML = '<option value="">暂无课程可选</option>';
    return;
  }
  html += '<div class="table-wrap"><table class="table table-hover align-middle"><thead><tr><th>课程</th><th>描述</th><th>时间</th><th>学分</th><th>学生数</th><th>操作</th></tr></thead><tbody>';
  courses.forEach(function(c) {
    html += '<tr><td><span class="fw-semibold">' + App.escapeHtml(c.name || '未命名课程') + '</span></td><td>' + App.escapeHtml(c.description || '暂无课程描述') + '</td><td>' + App.escapeHtml(c.schedule || '时间待定') + '</td><td>' + (c.credits != null ? c.credits : '未设置') + '</td><td>' + (c.enrolledCount || 0) + '/' + (c.maxStudents || 50) + '</td><td><button class="btn btn-outline-primary btn-sm me-1" onclick="openCourseModal(' + c.id + ')"><i class="fa-solid fa-pen"></i> 编辑</button><button class="btn btn-outline-danger btn-sm" onclick="deleteCourse(' + c.id + ')"><i class="fa-solid fa-trash"></i></button></td></tr>';
  });
  html += '</tbody></table></div>';
  document.getElementById("courseBox").innerHTML = html;
  var sel = document.getElementById("assignCourse");
  sel.innerHTML = courses.map(function(c) { return '<option value="' + c.id + '">' + App.escapeHtml(c.name || '未命名课程') + '</option>'; }).join('');
}

function openCourseModal(id) {
  var course = teacherCourses.find(function(c) { return c.id === id; });
  courseId.value = course ? course.id : "";
  courseName.value = course ? (course.name || "") : "";
  courseDesc.value = course ? (course.description || "") : "";
  courseSchedule.value = course ? (course.schedule || "") : "";
  courseMax.value = course ? (course.maxStudents || 50) : 50;
  courseCredits.value = course ? (course.credits || 3) : 3;
  courseModalTitle.textContent = course ? "编辑课程" : "新建课程";
  new bootstrap.Modal(courseModal).show();
}

async function saveCourse() {
  var payload = {
    name: courseName.value.trim(),
    description: courseDesc.value.trim(),
    schedule: courseSchedule.value.trim(),
    maxStudents: Number(courseMax.value || 50),
    credits: Number(courseCredits.value || 3)
  };
  if (courseId.value) {
    await api("/teacher/courses/" + courseId.value, "PUT", payload);
  } else {
    await api("/teacher/courses", "POST", payload);
  }
  bootstrap.Modal.getInstance(courseModal).hide();
  loadCourses();
  loadDashboard();
}

async function deleteCourse(id) {
  await api("/teacher/courses/" + id, "DELETE");
  loadCourses();
  loadDashboard();
}

async function loadStudents() {
  var courses = await api("/teacher/courses");
  var html = '<div class="section-head"><h5 class="mb-0">学生管理</h5><span class="metric-muted">按课程查看选课学生</span></div>';
  var hasStudents = false;
  for (var ci = 0; ci < courses.length; ci++) {
    var c = courses[ci];
    var students = await api("/teacher/courses/" + c.id + "/students");
    if (!students.length) {
      html += '<div class="table-wrap mb-3"><h6 class="mb-3"><i class="fa-solid fa-book me-2" style="color:var(--accent)"></i>' + App.escapeHtml(c.name || '未命名课程') + '</h6>' + renderEmptyPanel('暂无选课学生', '该课程目前还没有学生加入。', true) + '</div>';
      continue;
    }
    hasStudents = true;
    html += '<div class="table-wrap mb-3"><h6 class="mb-3"><i class="fa-solid fa-book me-2" style="color:var(--accent)"></i>' + App.escapeHtml(c.name || '未命名课程') + '</h6><table class="table table-sm table-hover align-middle"><thead><tr><th>学生姓名</th><th>用户名</th><th>邮箱</th></tr></thead><tbody>';
    students.forEach(function(s) {
      html += '<tr><td>' + App.escapeHtml(s.displayName || '未填写姓名') + '</td><td>' + App.escapeHtml(s.username || '-') + '</td><td>' + App.escapeHtml(s.email || '未填写邮箱') + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }
  document.getElementById("studentBox").innerHTML = courses.length ? html : renderEmptyPanel('暂无课程数据', '创建课程后可在这里查看学生名单。', false);
}

async function loadAssignments() {
  var courses = await api("/teacher/courses");
  teacherAssignments = [];
  var html = '<div class="section-head"><h5 class="mb-0">作业管理</h5><button class="btn btn-primary btn-sm" onclick="new bootstrap.Modal(assignModal).show()">发布作业</button></div>';
  var hasData = false;
  for (var ci = 0; ci < courses.length; ci++) {
    var c = courses[ci];
    var list = await api("/teacher/courses/" + c.id + "/assignments");
    list.forEach(function(a) { teacherAssignments.push(a); });
    if (!list.length) {
      html += '<div class="table-wrap mb-3"><h6 class="mb-3"><i class="fa-solid fa-book me-2" style="color:var(--accent)"></i>' + App.escapeHtml(c.name || '未命名课程') + '</h6>' + renderEmptyPanel('暂无作业', '这门课程还没有发布作业，可直接从上方创建。', true) + '</div>';
      continue;
    }
    hasData = true;
    html += '<div class="table-wrap mb-3"><h6 class="mb-3"><i class="fa-solid fa-book me-2" style="color:var(--accent)"></i>' + App.escapeHtml(c.name || '未命名课程') + '</h6><table class="table table-sm"><thead><tr><th>标题</th><th>截止</th><th>满分</th><th>互评</th><th>提交数</th></tr></thead><tbody>';
    list.forEach(function(a) {
      var status = a.peerReviewEnabled ? '<span class="badge-soft bg-info bg-opacity-10 text-info">已开启</span>' : '<span class="badge-soft bg-secondary bg-opacity-10 text-secondary">未开启</span>';
      html += '<tr><td>' + App.escapeHtml(a.title || '未命名作业') + '</td><td>' + (App.fmtTime(a.dueDate) || '无截止时间') + '</td><td>' + (a.totalPoints || 100) + '</td><td>' + status + '</td><td>' + (a.submissionCount || 0) + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }
  document.getElementById("assignmentBox").innerHTML = courses.length ? html : renderEmptyPanel('暂无课程可发布作业', '请先创建课程，再为课程发布作业。', false);
}

async function publishAssignment() {
  await api("/teacher/assignments", "POST", {
    title: assignTitle.value.trim(),
    description: assignDesc.value.trim(),
    dueDate: assignDue.value,
    totalPoints: Number(assignPoints.value || 100),
    course: { id: Number(assignCourse.value) }
  });
  bootstrap.Modal.getInstance(assignModal).hide();
  loadAssignments();
  loadPeerReviewManage();
  loadDashboard();
}

async function loadPeerReviewManage() {
  var courses = await api("/teacher/courses");
  var html = '<div class="section-head"><h5 class="mb-0">互评管理</h5></div>';
  var hasData = false;
  for (var ci = 0; ci < courses.length; ci++) {
    var c = courses[ci];
    var assignments = await api("/teacher/courses/" + c.id + "/assignments");
    if (!assignments.length) continue;
    hasData = true;
    html += '<div class="table-wrap mb-3"><h6 class="mb-3"><i class="fa-solid fa-book me-2" style="color:var(--accent)"></i>' + App.escapeHtml(c.name) + '</h6><table class="table table-sm align-middle"><thead><tr><th>作业</th><th>状态</th><th>窗口</th><th>规则</th><th>参与统计</th><th></th></tr></thead><tbody>';
    for (var ai = 0; ai < assignments.length; ai++) {
      var a = assignments[ai];
      var overview = await api('/teacher/assignments/' + a.id + '/peer-review');
      var status = overview.enabled ? '<span class="badge-soft bg-success bg-opacity-10 text-success">已开启</span>' : '<span class="badge-soft bg-secondary bg-opacity-10 text-secondary">未开启</span>';
      html += '<tr><td>' + App.escapeHtml(a.title) + '</td><td>' + status + '</td><td>' + (overview.openAt ? App.fmtTime(overview.openAt) : '-') + ' ~ ' + (overview.closeAt ? App.fmtTime(overview.closeAt) : '-') + '</td><td>' + (overview.requiredCount || 1) + ' 次 / 每次 ' + Number(overview.bonusPerReview || 0).toFixed(1) + ' 分 / 上限 ' + Number(overview.bonusCap || 0).toFixed(1) + ' 分</td><td>已提交 ' + (overview.totalReviews || 0) + ' 次，已加分 ' + (overview.grantedCount || 0) + ' 次</td><td><button class="btn btn-outline-primary btn-sm" onclick="openPeerConfig(' + a.id + ', ' + JSON.stringify(App.escapeAttr(a.title || '')).replace(/"/g, '&quot;') + ')"><i class="fa-solid fa-sliders me-1"></i>配置</button></td></tr>';
    }
    html += '</tbody></table></div>';
  }
  document.getElementById('peerReviewManageBox').innerHTML = hasData ? html : '<div class="text-muted text-center py-5">请先发布作业，再配置互评</div>';
}

async function openPeerConfig(assignmentId, title) {
  var overview = await api('/teacher/assignments/' + assignmentId + '/peer-review');
  peerConfigAssignmentId.value = assignmentId;
  peerConfigTitle.textContent = String(title || '').replace(/&quot;/g, '');
  peerEnabled.checked = !!overview.enabled;
  peerOpenAt.value = overview.openAt ? String(overview.openAt).slice(0, 16) : '';
  peerCloseAt.value = overview.closeAt ? String(overview.closeAt).slice(0, 16) : '';
  peerRequiredCount.value = overview.requiredCount || 1;
  peerBonusPerReview.value = overview.bonusPerReview != null ? overview.bonusPerReview : 1;
  peerBonusCap.value = overview.bonusCap != null ? overview.bonusCap : 1;
  peerPrompt.value = overview.prompt || '';
  new bootstrap.Modal(peerConfigModal).show();
}

async function savePeerConfig() {
  var assignmentId = peerConfigAssignmentId.value;
  await api('/teacher/assignments/' + assignmentId + '/peer-review', 'POST', {
    peerReviewEnabled: peerEnabled.checked,
    peerReviewOpenAt: peerOpenAt.value || null,
    peerReviewCloseAt: peerCloseAt.value || null,
    peerReviewRequiredCount: Number(peerRequiredCount.value || 1),
    peerReviewBonusPerReview: Number(peerBonusPerReview.value || 1),
    peerReviewBonusCap: Number(peerBonusCap.value || 1),
    peerReviewPrompt: peerPrompt.value.trim()
  });
  bootstrap.Modal.getInstance(peerConfigModal).hide();
  loadAssignments();
  loadPeerReviewManage();
  loadDashboard();
}

async function loadGrading() {
  var courses = await api("/teacher/courses");
  gradingSubmissionMeta = {};
  var html = '<div class="section-head"><h5 class="mb-0">评分任务</h5><span class="metric-muted">集中查看学生提交与附件</span></div>';
  var hasGrading = false;
  for (var ci = 0; ci < courses.length; ci++) {
    var c = courses[ci];
    var assignments = await api("/teacher/courses/" + c.id + "/assignments");
    for (var ai = 0; ai < assignments.length; ai++) {
      var a = assignments[ai];
      var subs = await api("/teacher/assignments/" + a.id + "/submissions");
      if (!subs.length) continue;
      hasGrading = true;
      html += '<div class="table-wrap mb-3"><h6 class="mb-2"><i class="fa-solid fa-file me-2" style="color:var(--accent-2)"></i>' + App.escapeHtml(c.name || '未命名课程') + ' / ' + App.escapeHtml(a.title || '未命名作业') + '</h6><table class="table table-sm"><thead><tr><th>学生</th><th>提交内容</th><th>状态</th><th>分数</th><th></th></tr></thead><tbody>';
      subs.forEach(function(s) {
        var submittedContent = s.content ? App.escapeHtml(s.content) : '仅附件提交';
        var attachments = App.parseStoredFiles(s.filePaths);
        if (attachments.length) {
          submittedContent += '<div class="small text-muted mt-1 d-flex flex-column gap-1">' + attachments.map(function(file) {
            var safeName = App.escapeHtml(file.name || '附件');
            var safePathAttr = App.escapeAttr(file.path || '');
            var safeNameAttr = App.escapeAttr(file.name || '附件');
            return '<div><i class="fa-solid fa-paperclip me-1"></i>' + safeName + ' <a href="javascript:;" data-path="' + safePathAttr + '" onclick="previewStoredFile(this.dataset.path)" class="text-decoration-none ms-1">预览</a> <a href="javascript:;" data-path="' + safePathAttr + '" data-name="' + safeNameAttr + '" onclick="downloadStoredFile(this.dataset.path, this.dataset.name)" class="text-decoration-none ms-1">下载</a></div>';
          }).join('') + '</div>';
        }
        var studentName = s.student ? (s.student.displayName || s.student.username) : '-';
        gradingSubmissionMeta[s.id] = {
          studentName: studentName,
          teacherComment: s.teacherComment || '',
          score: s.score
        };
        html += '<tr><td>' + App.escapeHtml(studentName) + '</td><td>' + submittedContent + '</td><td>' + (s.status === 'SUBMITTED' ? '<span class="badge-soft bg-warning bg-opacity-10 text-warning">待评分</span>' : s.status === 'GRADED' ? '<span class="badge-soft bg-success bg-opacity-10 text-success">已评分</span>' : App.escapeHtml(s.status || '待处理')) + '</td><td><span class="fw-semibold">' + (s.score != null ? s.score : '-') + '</span></td><td><button class="btn btn-outline-primary btn-sm" onclick="openGradeModal(' + s.id + ')"><i class="fa-solid fa-pen"></i> 评分</button></td></tr>';
      });
      html += '</tbody></table></div>';
    }
  }
  document.getElementById("gradingBox").innerHTML = hasGrading ? html : renderEmptyPanel('暂无待评分作业', '学生提交后，会在这里集中展示评分任务。', false);
}

async function loadQuickComments(category) {
  if (category !== undefined) {
    quickCommentCategory = category && category !== 'all' ? category : 'all';
  }
  document.querySelectorAll('#gradeModal .btn-group .btn').forEach(function(btn) {
    var btnCategory = btn.dataset.category || 'all';
    btn.classList.toggle('active', btnCategory === quickCommentCategory);
  });
  var query = quickCommentCategory !== 'all' ? ('?category=' + encodeURIComponent(quickCommentCategory)) : '';
  var list = await api('/teacher/comment-memories' + query);
  var box = document.getElementById('quickCommentBox');
  if (!list.length) {
    box.innerHTML = '<div class="text-muted small">暂无快捷评语，提交批改后会自动记忆常用评语。</div>';
    return;
  }
  box.innerHTML = list.map(function(item) {
    gradingSubmissionMeta['comment:' + item.id] = item.commentText || '';
    return '<button type="button" class="btn btn-outline-primary btn-sm text-start" onclick="applyQuickComment(' + item.id + ')">' +
      '<span class="d-block fw-semibold">' + App.escapeHtml(mapCommentCategory(item.category)) + '</span>' +
      '<span class="d-block small text-muted">使用 ' + (item.usageCount || 0) + ' 次</span>' +
      '<span class="d-block mt-1">' + App.escapeHtml(item.commentText || '') + '</span>' +
      '</button>';
  }).join('');
}

function mapCommentCategory(category) {
  return {
    ENCOURAGEMENT: '鼓励',
    CORRECTION: '纠错',
    SCORE_IMPROVEMENT: '提分'
  }[category] || '快捷评语';
}

function applyQuickComment(id) {
  gradeQuickCommentId.value = id;
  gradeComment.value = gradingSubmissionMeta['comment:' + id] || '';
}

async function openGradeModal(id) {
  var meta = gradingSubmissionMeta[id] || {};
  gradeSubmissionId.value = id;
  gradeStudentName.value = meta.studentName || '';
  gradeComment.value = meta.teacherComment || '';
  gradeScore.value = meta.score == null ? '' : meta.score;
  gradeQuickCommentId.value = '';
  quickCommentCategory = 'all';
  await loadQuickComments('all');
  currentGradeRow = new bootstrap.Modal(gradeModal);
  currentGradeRow.show();
}

async function submitGrade() {
  var id = Number(gradeSubmissionId.value);
  var num = Number(gradeScore.value);
  if (isNaN(num) || num < 0 || num > 100) {
    alert('分数必须在0-100之间');
    return;
  }
  var payload = {
    score: num,
    comment: gradeComment.value.trim(),
    quickCommentId: gradeQuickCommentId.value ? Number(gradeQuickCommentId.value) : null
  };
  await api('/teacher/submissions/' + id + '/grade', 'POST', payload);
  if (currentGradeRow) currentGradeRow.hide();
  loadGrading();
  loadAnalysis();
}

async function loadAnalysis() {
  var courses = await api("/teacher/courses");
  var html = '<div class="section-head"><h5 class="mb-0">作业分析</h5><span class="metric-muted">展示成绩分布与及格率</span></div>';
  var charts = [];
  for (var ci = 0; ci < courses.length; ci++) {
    var c = courses[ci];
    var assignments = await api("/teacher/courses/" + c.id + "/assignments");
    for (var ai = 0; ai < assignments.length; ai++) {
      var a = assignments[ai];
      var d = await api("/teacher/assignments/" + a.id + "/analysis");
      if (!d || !d.distribution || !d.distribution.length) continue;
      var aid = 'ana-' + a.id;
      charts.push({ id: aid, data: d });
      html += '<div class="section-surface mb-3 analysis-card"><div class="d-flex justify-content-between align-items-start gap-2 mb-2"><h6 class="mb-0"><i class="fa-solid fa-chart-bar me-2" style="color:var(--accent)"></i>' + App.escapeHtml(a.title || '未命名作业') + '</h6><span class="badge-soft bg-primary bg-opacity-10 text-primary">平均分 ' + (d.average != null ? Number(d.average).toFixed(1) : '-') + '</span></div><div class="metric-row mb-2"><span>提交 ' + (d.total || 0) + '</span><span>最高 ' + (d.max != null ? d.max : '-') + '</span><span>及格率 ' + (d.passRate != null ? d.passRate : 0) + '%</span></div><div id="' + aid + '" style="height:260px"></div></div>';
    }
  }
  document.getElementById("analysisBox").innerHTML = charts.length ? html : html + renderEmptyPanel('暂无分析数据', '学生提交并评分后，这里会展示成绩分布与趋势。', false);
  charts.forEach(function(item) {
    var el = document.getElementById(item.id);
    if (!el) return;
    var ch = echarts.getInstanceByDom(el) || echarts.init(el);
    ch.setOption({
      tooltip: {},
      grid: { left: 40, right: 16, top: 20, bottom: 24 },
      xAxis: { type: "category", data: item.data.buckets },
      yAxis: { type: "value" },
      series: [{ type: "bar", data: item.data.distribution, itemStyle: { color: "#2563eb", borderRadius: [6,6,0,0] } }]
    });
  });
}

loadDashboard();
</script>
